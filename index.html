<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광물 메모리 게임</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f5f5f5; margin:0; }
.container { max-width: 500px; margin: auto; padding: 15px; }

input, select, button {
  width: 100%;
  padding: 12px;
  margin: 5px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button { background: #4CAF50; color: white; border: none; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.card {
  background: #ccc;
  height: 70px;
  border-radius: 10px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.revealed { background: #fff; }
.matched { background: #a0e7a0; }

.infoBox {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 광물 게임</h2>

<!-- 🔥 반 드롭다운 -->
<select id="classInput">
  <option value="">반 선택</option>
  <option>1반</option>
  <option>2반</option>
  <option>3반</option>
  <option>4반</option>
  <option>5반</option>
  <option>6반</option>
  <option>7반</option>
  <option>8반</option>
  <option>9반</option>
  <option>10반</option>
  
</select>

<input type="text" id="numInput" placeholder="번호 입력">

<select id="playerCount">
  <option value="2">2명</option>
  <option value="3">3명</option>
  <option value="4" selected>4명</option>
</select>

<div id="nameInputs"></div>

<button onclick="startGame()">🎮 게임 시작</button>
<button onclick="submitResult()">📤 결과 제출</button>

<div class="infoBox">
  <p id="timer">⏱ 300초</p>
  <p id="turn"></p>
  <p id="score"></p>
</div>

<div class="grid" id="game"></div>

</div>

<script>
let players=[], customNames=[], scores=[];
let currentPlayer=0, timeLeft=300, timer;
let submitted=false;

const URL="여기에_너_URL";

const playerCountSelect=document.getElementById("playerCount");
const nameInputsDiv=document.getElementById("nameInputs");

playerCountSelect.addEventListener("change", updateNameInputs);

function updateNameInputs(){
  const count=parseInt(playerCountSelect.value);
  nameInputsDiv.innerHTML="";
  for(let i=0;i<count;i++){
    nameInputsDiv.innerHTML+=`<input type="text" id="p${i}" placeholder="${i+1}번 이름">`;
  }
}
updateNameInputs();

const minerals=["방해석","자철석","석영","황동석","황철석","흑운모","적철석","장석"];

let data=[], first=null, lock=false;

function startGame(){
  submitted=false;

  const count=parseInt(playerCountSelect.value);
  players=[]; customNames=[];

  for(let i=0;i<count;i++){
    let name=document.getElementById(`p${i}`).value||`${i+1}번`;
    players.push(name); customNames.push(name);
  }

  scores=new Array(count).fill(0);
  currentPlayer=0;
  timeLeft=300;

  document.getElementById("game").innerHTML="";
  data=[...minerals,...minerals].sort(()=>Math.random()-0.5);

  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText="?";

    div.onclick=()=>{
      if(lock||div.classList.contains("matched")||div.classList.contains("revealed"))return;

      div.classList.add("revealed");
      div.innerText=item;

      if(!first){
        first={div,item};
      }else{
        lock=true;

        if(first.item===item){
          div.classList.add("matched");
          first.div.classList.add("matched");
          scores[currentPlayer]++;
          first=null; lock=false;
          update();
        }else{
          setTimeout(()=>{
            div.innerText="?";
            first.div.innerText="?";
            div.classList.remove("revealed");
            first.div.classList.remove("revealed");
            first=null; lock=false;
            currentPlayer=(currentPlayer+1)%players.length;
            update();
          },600);
        }
      }
    };

    document.getElementById("game").appendChild(div);
  });

  update();

  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`⏱ ${timeLeft}초`;
    if(timeLeft<=0){
      clearInterval(timer);
      alert("시간 종료! 제출하세요");
    }
  },1000);
}

function update(){
  document.getElementById("turn").innerText=`👉 ${customNames[currentPlayer]} 턴`;
  document.getElementById("score").innerText=customNames.map((p,i)=>`${p}:${scores[i]}`).join(" | ");
}

function submitResult(){
  if(submitted){
    alert("이미 제출함!");
    return;
  }

  const className=document.getElementById("classInput").value||"미선택";
  const number=document.getElementById("numInput").value||"미입력";

  customNames.forEach((name,i)=>{
    fetch(URL,{
      method:"POST",
      body:JSON.stringify({
        class:className,
        number:number,
        name:name,
        score:scores[i],
        time:timeLeft
      })
    });
  });

  submitted=true;
  alert("제출 완료!");
}
</script>

</body>
</html>
