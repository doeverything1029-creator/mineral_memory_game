<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광물 메모리 게임</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f5f5f5; }
h2 { margin-top:20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr); /* ✅ 8열 */
  gap: 8px;
  max-width: 1000px;
  margin: 20px auto;
}

.card {
  background: #ccc;
  min-height: 90px;
  padding: 5px;
  cursor: pointer;
  border-radius: 10px;
  font-size: 13px;
  word-break: keep-all;
  display: flex;
  justify-content: center;
  align-items: center;
}

.revealed { background: #fff; }
.matched { background: #a0e7a0; }

img {
  width: 100%;
  height: 80px;
  object-fit: contain;
  background: white;
}

.playerBox {
  border: 2px solid #aaa;
  margin: 5px;
  padding: 5px;
  border-radius: 10px;
}

.cardRow {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.miniCard {
  border: 1px solid #999;
  border-radius: 6px;
  padding: 4px;
  font-size: 11px;
  background: #f9f9f9;
  min-width: 90px;
}
</style>
</head>

<body>

<h2>광물 메모리 게임</h2>

<div>
  <p>플레이어 수 선택</p>
  <select id="playerCount">
    <option value="2">2명</option>
    <option value="3">3명</option>
    <option value="4" selected>4명</option>
  </select>

  <div id="nameInputs"></div>
</div>

<button onclick="startGame()">게임 시작</button>

<p id="timer">남은 시간: 300초</p>
<p id="turn"></p>
<p id="score"></p>

<div class="grid" id="game"></div>

<h3>획득 카드 (점수순)</h3>
<div id="collected"></div>

<script>
let players = [];
let customNames = [];
let scores = [];
let collectedCards = [];
let currentPlayer = 0;
let timeLeft = 300;
let timer;
let totalMatch = 0;

const playerCountSelect = document.getElementById("playerCount");
const nameInputsDiv = document.getElementById("nameInputs");

playerCountSelect.addEventListener("change", updateNameInputs);

function updateNameInputs() {
  const count = parseInt(playerCountSelect.value);
  nameInputsDiv.innerHTML = "";

  for (let i = 0; i < count; i++) {
    nameInputsDiv.innerHTML += `
      <input type="text" id="p${i}" placeholder="${i+1}번 이름"><br>
    `;
  }
}
updateNameInputs();

const successSound = new Audio("success.mp3");
const failSound = new Audio("fail.mp3");

const minerals = [
 {name:"방해석", img:"calcite.jpg", group:"A", t1:"조흔색 흰색, 석영보다 무르다", t2:"염산 → 거품 발생"},
 {name:"자철석", img:"magnetite.jpg", group:"B", t1:"검은색, 자성 O", t2:"자석에 붙음"},
 {name:"석영", img:"quartz.jpg", group:"C", t1:"모래의 주성분", t2:"염산반응 X"},
 {name:"황동석", img:"chalcopyrite.jpg", group:"D", t1:"구리를 얻을 수 있음", t2:"노란색"},
 {name:"황철석", img:"pyrite.jpg", group:"E", t1:"바보금", t2:"검은색 조흔"},
 {name:"흑운모", img:"biotite.jpg", group:"F", t1:"얇게 쪼개짐", t2:"검은색"},
 {name:"적철석", img:"hematite.jpg", group:"G", t1:"적갈색 조흔", t2:"자성 X"},
 {name:"장석", img:"feldspar.jpg", group:"H", t1:"도자기 원료", t2:"지각 구성"},
 {name:"감람석", img:"olivine.jpg", group:"I", t1:"녹색", t2:"맨틀에 많음"},
 {name:"각섬석", img:"amphibole.jpg", group:"J", t1:"녹갈색", t2:"기둥 모양"}
];

let data=[], first=null, lock=false;

function startGame(){
  const count = parseInt(playerCountSelect.value);

  players = [];
  customNames = [];

  for (let i = 0; i < count; i++) {
    const name = document.getElementById(`p${i}`).value || `${i+1}번`;
    players.push(name);
    customNames.push(name);
  }

  scores = new Array(count).fill(0);
  collectedCards = Array.from({length: count}, () => []);

  currentPlayer=0;
  timeLeft=300;
  totalMatch=0;

  document.getElementById("game").innerHTML="";
  document.getElementById("collected").innerHTML="";
  data=[];

  minerals.forEach(m=>{
    data.push(
      {type:"name",content:m.name,group:m.group},
      {type:"img",content:m.img,group:m.group},
      {type:"desc",content:m.t1,group:m.group},
      {type:"desc",content:m.t2,group:m.group}
    );
  });

  data.sort(()=>Math.random()-0.5);

  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText="?";

    div.onclick=()=>{
      if(lock || div.classList.contains("matched") || div.classList.contains("revealed")) return;

      div.classList.add("revealed");

      if(item.type==="img"){
        div.innerHTML=`<img src="${item.content}">`;
      } else {
        div.innerText=item.content;
      }

      if(!first){
        first={div,group:item.group,type:item.type};
      }else{
        lock=true;

        const valid =
          first.group===item.group &&
          ((first.type==="name"&&item.type==="desc") ||
           (first.type==="desc"&&item.type==="name") ||
           (first.type==="img"&&item.type==="desc") ||
           (first.type==="desc"&&item.type==="img"));

        if(valid){
          successSound.play();
          first.div.classList.add("matched");
          div.classList.add("matched");
          scores[currentPlayer]++;
          totalMatch++;
          first=null;
          lock=false;
          update();

        }else{
          failSound.play();
          setTimeout(()=>{
            first.div.innerText="?";
            div.innerText="?";
            first.div.classList.remove("revealed");
            div.classList.remove("revealed");
            first=null;
            lock=false;
            currentPlayer=(currentPlayer+1)%players.length;
            update();
          },800);
        }
      }
    };

    document.getElementById("game").appendChild(div);
  });

  update();

  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`남은 시간: ${timeLeft}초`;

    if(timeLeft<=0){
      clearInterval(timer);

      fetch("https://script.google.com/macros/s/AKfycby454SAjsLr7CUV8e7Ugdqb2TwPOxM2LSFiplVk0xRYAh_W1kDxiGaLlJpNZSVbYrqJjQ/exec", {
        method: "POST",
        body: JSON.stringify({
          name: customNames.join(", "),
          score: scores.map(s=>Number(s)).join(", "), /* ✅ 핵심 수정 */
          time: timeLeft
        })
      });

      alert("게임 종료!");
    }
  },1000);
}

function update(){
  document.getElementById("turn").innerText=`현재 턴: ${customNames[currentPlayer]}`;
  document.getElementById("score").innerText=
    customNames.map((p,i)=>`${p}:${scores[i]}`).join(" | ");
}
</script>

</body>
</html>
