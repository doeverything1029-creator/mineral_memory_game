<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광물 메모리 게임</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f5f5f5; }

h2 { margin-top:20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
  max-width: 1000px;
  margin: 20px auto;
}

.card {
  background: #ccc;
  min-height: 90px;
  padding: 5px;
  cursor: pointer;
  border-radius: 10px;
  font-size: 13px;
  word-break: keep-all;
  display: flex;
  justify-content: center;
  align-items: center;
}

.revealed { background: #fff; }
.matched { background: #a0e7a0; }

img { width: 100%; height: 80px; object-fit: contain; background: white; }

.playerBox { border: 2px solid #aaa; margin: 5px; padding: 5px; border-radius: 10px; }

.cardRow { display: flex; flex-wrap: wrap; gap: 6px; }

.miniCard { border: 1px solid #999; border-radius: 6px; padding: 4px; font-size: 11px; background: #f9f9f9; min-width: 90px; }
</style>
</head>

<body>

<h2>광물 메모리 게임</h2>

<div>
  <p>플레이어 수 선택</p>
  <select id="playerCount">
    <option value="2">2명</option>
    <option value="3">3명</option>
    <option value="4" selected>4명</option>
  </select>

  <div id="nameInputs"></div>
</div>

<button onclick="startGame()">게임 시작</button>
<button onclick="endGame()">게임 종료</button>

<p id="timer">남은 시간: 300초</p>
<p id="turn"></p>
<div id="score"></div>

<div class="grid" id="game"></div>

<h3>획득 카드 (점수순)</h3>
<div id="collected"></div>

<script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycbwneo3HVzQF3R6_TkLa0ULLq8EZx2IKA2QKUlBehvLe69QTz-61CjwVXD1VqsA0waDtJw/exec";

// (중간 코드 전부 그대로 유지)

// ↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓

  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById("timer").innerText=`남은 시간: ${timeLeft}초`;
    if(timeLeft<=0){
      clearInterval(timer);
      let max=Math.max(...scores);
      let winners=customNames.filter((p,i)=>scores[i]===max);

      // 🔥 추가 (정렬)
      let sorted = customNames.map((name,i)=>({name:name, score:scores[i]}))
                              .sort((a,b)=>b.score - a.score);
      let sortedNames = sorted.map(x=>x.name).join(", ");
      let sortedScores = sorted.map(x=>x.score).join(", ");

      fetch(SHEET_URL, {
        method: "POST",
        body: JSON.stringify({
          name: sortedNames,
          score: sortedScores,
          time: timeLeft
        }),
        mode: "no-cors"
      });

      alert(`🎉 1등: ${winners.join(", ")} 🎉`);
    }
  },1000);

// ↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑↑

// (중간 코드 그대로 유지)

function endGame(){
  clearInterval(timer);

  let max = Math.max(...scores);
  let winners = customNames.filter((p,i)=>scores[i]===max);

  // 🔥 추가 (정렬)
  let sorted = customNames.map((name,i)=>({name:name, score:scores[i]}))
                          .sort((a,b)=>b.score - a.score);
  let sortedNames = sorted.map(x=>x.name).join(", ");
  let sortedScores = sorted.map(x=>x.score).join(", ");

  fetch(SHEET_URL, {
    method: "POST",
    body: JSON.stringify({
      name: sortedNames,
      score: sortedScores,
      time: timeLeft
    }),
    mode: "no-cors"
  });

  alert(`🛑 게임 종료! 1등: ${winners.join(", ")} 🛑`);
}

</script>

</body>
</html>
