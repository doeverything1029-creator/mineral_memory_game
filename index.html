<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>광물 메모리 게임</title>

<style>
body { font-family: sans-serif; text-align: center; background:#f5f5f5; }
h2 { margin-top:20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
  max-width: 1000px;
  margin: 20px auto;
}

.card {
  background: #ccc;
  min-height: 90px;
  padding: 5px;
  cursor: pointer;
  border-radius: 10px;
  font-size: 13px;
  word-break: keep-all;
  display: flex;
  justify-content: center;
  align-items: center;
}

.revealed { background: #fff; }
.matched { background: #a0e7a0; }

img {
  width: 100%;
  height: 80px;
  object-fit: contain;
  background: white;
}

.playerBox {
  border: 2px solid #aaa;
  margin: 5px;
  padding: 5px;
  border-radius: 10px;
}

.cardRow {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.miniCard {
  border: 1px solid #999;
  border-radius: 6px;
  padding: 4px;
  font-size: 11px;
  background: #f9f9f9;
  min-width: 90px;
}
</style>
</head>

<body>

<h2>광물 메모리 게임</h2>

<div>
  <p>플레이어 수 선택</p>
  <select id="playerCount">
    <option value="2">2명</option>
    <option value="3">3명</option>
    <option value="4" selected>4명</option>
  </select>

  <div id="nameInputs"></div>
</div>

<button onclick="startGame()">게임 시작</button>

<p id="timer">남은 시간: 300초</p>
<p id="turn"></p>
<p id="score"></p>

<div class="grid" id="game"></div>

<h3>획득 카드 (점수순)</h3>
<div id="collected"></div>

<script>
let players = [];
let customNames = [];
let scores = [];
let collectedCards = [];
let currentPlayer = 0;
let timeLeft = 300;
let timer;
let totalMatch = 0;

const playerCountSelect = document.getElementById("playerCount");
const nameInputsDiv = document.getElementById("nameInputs");

playerCountSelect.addEventListener("change", updateNameInputs);

function updateNameInputs() {
  const count = parseInt(playerCountSelect.value);
  nameInputsDiv.innerHTML = "";

  for (let i = 0; i < count; i++) {
    nameInputsDiv.innerHTML += `
      <input type="text" id="p${i}" placeholder="${i+1}번 이름"><br>
    `;
  }
}
updateNameInputs();

const successSound = new Audio("success.mp3");
const failSound = new Audio("fail.mp3");

const minerals = [
 {name:"방해석", img:"calcite.jpg", group:"A", t1:"조흔색 흰색, 석영보다 무르다", t2:"염산 → 거품 발생"},
 {name:"자철석", img:"magnetite.jpg", group:"B", t1:"검은색, 자성 O", t2:"자석에 붙음"},
 {name:"석영", img:"quartz.jpg", group:"C", t1:"모래의 주성분", t2:"염산반응 X"},
];

let data=[], first=null, lock=false;

function startGame(){
  const count = parseInt(playerCountSelect.value);

  players = [];
  customNames = [];

  for (let i = 0; i < count; i++) {
    const name = document.getElementById(`p${i}`).value || `${i+1}번`;
    players.push(name);
    customNames.push(name);
  }

  scores = new Array(count).fill(0);
  collectedCards = Array.from({length: count}, () => []);

  currentPlayer=0;
  timeLeft=300;
  totalMatch=0;

  document.getElementById("game").innerHTML="";
  data=[];

  minerals.forEach(m=>{
    data.push(
      {type:"name",content:m.name,group:m.group},
      {type:"img",content:m.img,group:m.group},
      {type:"desc",content:m.t1,group:m.group},
      {type:"desc",content:m.t2,group:m.group}
    );
  });

  data.sort(()=>Math.random()-0.5);

  data.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerText="?";

    div.onclick=()=>{
      if(lock) return;

      div.classList.add("revealed");

      if(item.type==="img"){
        div.innerHTML=`<img src="${item.content}">`;
      } else {
        div.innerText=item.content;
      }

      if(!first){
        first={div,group:item.group,type:item.type};
      }else{
        lock=true;

        if(first.group===item.group){
          successSound.play();
          scores[currentPlayer]++;
        }else{
          failSound.play();
        }

        setTimeout(()=>{
          first=null;
          lock=false;
          currentPlayer=(currentPlayer+1)%players.length;
          update();
        },800);
      }
    };

    document.getElementById("game").appendChild(div);
  });

  update();
}

function update(){
  document.getElementById("turn").innerText=`현재 턴: ${customNames[currentPlayer]}`;
  document.getElementById("score").innerText=
    customNames.map((p,i)=>`${p}:${scores[i]}`).join(" | ");
}
</script>

</body>
</html>
